<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生请假申请表</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="leave-header">
        <span class="back-icon"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 12 24"><path fill="currentColor" fill-rule="evenodd" d="M10 19.438L8.955 20.5l-7.666-7.79a1.02 1.02 0 0 1 0-1.42L8.955 3.5L10 4.563L2.682 12z"></path></svg></span>
        <span class="close-icon"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"><defs><path id="SVG0kegTdID" fill="currentColor" d="M8 6.943L1.807.75L.75 1.807L6.943 8L.75 14.193l1.057 1.057L8 9.057l6.193 6.193l1.057-1.057L9.057 8l6.193-6.193L14.193.75z"></path></defs><use fill-rule="evenodd" href="#SVG0kegTdID" transform="translate(4 4)"></use></svg></span>
        <span class="star-icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 1024 1024" aria-hidden="true"><g transform="translate(0 896) scale(1 -1)"><path fill="currentColor" d="M950 439Q969 462 961.5 484.5Q954 507 925 515L682 570L554 785Q538 811 514 811Q490 811 474 785L346 570L103 515Q73 507 66 484.5Q59 462 78 439L242 251L220 2Q218 -29 237 -42.5Q256 -56 284 -45L522 57Q530 61 533 68.5Q536 76 532.5 84.5Q529 93 521.5 96Q514 99 505 96L268 -6Q263 -9 262 -8Q261 -7 262 -2L286 265L110 467Q106 471 106.5 471.5Q107 472 112 473L373 533L510 763Q513 768 514 768Q515 768 517 763L654 533L916 473Q921 472 921 471.5Q921 471 918 467L741 265L766 -2Q767 -11 773.5 -16.5Q780 -22 789 -21Q798 -20 803.5 -13.5Q809 -7 808 2L785 251Z"></path></g></svg></span>
        <div class="leave-title">学生请假</div>
    </div>

    <div class="leave-tabs">
        <div class="tab-btn tab-left active">登记表</div>
        <div class="tab-btn tab-right">签批流程</div>
    </div>

    <div class="leave-form-wrap">
        <div class="form-title">学生请假申请表</div>
        
        <div class="leave-form-card">
            <table class="form-table">
                <tr>
                    <td class="form-label required">院系</td>
                    <td class="form-content"><input type="text" id="department" placeholder="请输入学院..." /></td>
                </tr>
                <tr>
                    <td class="form-label required">年级</td>
                    <td class="form-content"><input type="text" id="grade" placeholder="例: 2025" /></td>
                </tr>
                <tr>
                    <td class="form-label required">专业</td>
                    <td class="form-content"><input type="text" id="major" placeholder="例: B站大课堂" /></td>
                </tr>
                <tr>
                    <td class="form-label required">班级</td>
                    <td class="form-content"><input type="text" id="class" placeholder="例: B站大课堂25-01" /></td>
                </tr>
                <tr>
                    <td class="form-label required">姓名</td>
                    <td class="form-content"><input type="text" id="name" placeholder="请输入姓名..." /></td>
                </tr>
                <tr>
                    <td class="form-label required">学号</td>
                    <td class="form-content"><input type="text" id="studentId" placeholder="请输入学号..." /></td>
                </tr>
                <tr>
                    <td class="form-label required">性别</td>
                    <td class="form-content">
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" name="gender" id="genderMale" value="男">
                                <label for="genderMale">男</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="gender" id="genderFemale" value="女">
                                <label for="genderFemale">女</label>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="form-label required">民族</td>
                    <td class="form-content"><input type="text" id="ethnicity" placeholder="汉族" /></td>
                </tr>
                <tr>
                    <td class="form-label required">申请日期</td>
                    <td class="form-content"><input type="date" id="applyDate" /></td>
                </tr>
                <tr>
                    <td class="form-label required">联系方式</td>
                    <td class="form-content"><input type="text" id="phone" placeholder="请输入内容..." /></td>
                </tr>
                <tr>
                    <td class="form-label required">请假类型</td>
                    <td class="form-content">
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" name="leaveType" id="leaveTypePersonal" value="事假">
                                <label for="leaveTypePersonal">事假</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="leaveType" id="leaveTypeSick" value="病假">
                                <label for="leaveTypeSick">病假</label>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="form-label required">是否代请假</td>
                    <td class="form-content">
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" name="proxyLeave" id="proxyYes" value="是">
                                <label for="proxyYes">是</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="proxyLeave" id="proxyNo" value="否">
                                <label for="proxyNo">否</label>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="form-label required">请假开始时间</td>
                    <td class="form-content"><input type="date" id="startDate"></td>
                </tr>
                <tr>
                    <td class="form-label required">请假结束时间</td>
                    <td class="form-content"><input type="date" id="endDate"></td>
                </tr>
                <tr>
                    <td class="form-label">请假天数</td>
                    <td class="form-content" id="leaveDays"></td>
                </tr>
                <tr>
                    <td class="form-label required">家长是否知晓</td>
                    <td class="form-content">
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" name="parentKnow" id="parentKnowYes" value="是">
                                <label for="parentKnowYes">是</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="parentKnow" id="parentKnowNo" value="否">
                                <label for="parentKnowNo">否</label>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="form-label">家长姓名</td>
                    <td class="form-content"><input type="text" id="parentName" placeholder="可选输入家长姓名"></td>
                </tr>
                <tr>
                    <td class="form-label">家长联系电话</td>
                    <td class="form-content"><input type="text" id="parentPhone" placeholder="可选输入联系电话"></td>
                </tr>
                <tr>
                    <td class="form-label required">请假去向类型</td>
                    <td class="form-content">
                        <select id="destinationType">
                            <option value="">请选择</option>
                            <option value="校内">校内</option>
                            <option value="离校（在郑）">离校（在郑）</option>
                            <option value="离郑（省内）">离郑（省内）</option>
                            <option value="省外及其他区域">省外及其他区域</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td class="form-label required">请假去向（具体地点）</td>
                    <td class="form-content"><input type="text" id="destination" placeholder="请输入具体地点"></td>
                </tr>
                <tr>
                    <td class="form-label required">请假事由</td>
                    <td class="form-content"><input type="text" id="reason" placeholder="请输入请假事由"></td>
                </tr>
                <tr>
                    <td class="form-label">附件</td>
                    <td class="form-content"></td>
                </tr>
                <tr>
                    <td class="form-label required">辅导员姓名</td>
                    <td class="form-content"><input type="text" id="counselorName" placeholder="请输入内容..."></td>
                </tr>
                <tr>
                    <td class="form-label required">辅导员意见</td>
                    <td class="form-content" id="counselorOpinion">拟同意</td>
                </tr>
                <tr>
                    <td class="form-label">副书记意见</td>
                    <td class="form-content"></td>
                </tr>
                <tr>
                    <td class="form-label">书记意见</td>
                    <td class="form-content"></td>
                </tr>
            </table>
        </div>

        <div style="height: 80px;"></div>
    </div>

    <div class="fixed-bottom">
        <button class="btn-next">下一处理</button>
    </div>

    <script src="home.js"></script>
</body>
</html>
